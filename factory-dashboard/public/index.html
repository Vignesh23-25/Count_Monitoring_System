<!DOCTYPE html>
<html>
<head>
  <title>Factory Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 250px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .count {
      font-size: 30px;
      margin: 10px 0;
    }

    .eff {
      font-size: 20px;
    }

    .good { color: #22c55e; }
    .bad { color: #ef4444; }
  </style>
</head>

<body>

<h1>🏭 Leather Factory Dashboard</h1>

<div class="container">

  <div class="card">
    <h2>Cutting</h2>
    <div id="cutting_count" class="count">0</div>
    <div id="cutting_eff" class="eff">0%</div>
  </div>

  <div class="card">
    <h2>Stitching</h2>
    <div id="stitching_count" class="count">0</div>
    <div id="stitching_eff" class="eff">0%</div>
  </div>

</div>

<!-- Chart -->
<canvas id="chart" width="600" height="300"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  const socket = io();

  const ctx = document.getElementById('chart').getContext('2d');

  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Production Count',
        data: [],
        borderWidth: 2,
        tension: 0.3
      }]
    }
  });

  socket.on("data", (data) => {

    console.log(data);

    // ALERT LOGIC
    const effClass = data.efficiency < 70 ? "bad" : "good";

    // CUTTING
    if (data.station === "cutting_01") {
      document.getElementById("cutting_count").innerText = data.count;
      document.getElementById("cutting_eff").innerText =
        data.efficiency.toFixed(1) + "%";

      document.getElementById("cutting_eff").className = "eff " + effClass;
    }

    // STITCHING
    if (data.station === "stitching_01") {
      document.getElementById("stitching_count").innerText = data.count;
      document.getElementById("stitching_eff").innerText =
        data.efficiency.toFixed(1) + "%";

      document.getElementById("stitching_eff").className = "eff " + effClass;
    }

    // GRAPH UPDATE (for cutting for now)
    if (data.station === "cutting_01") {
      chart.data.labels.push(new Date().toLocaleTimeString());
      chart.data.datasets[0].data.push(data.count);

      if (chart.data.labels.length > 10) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }

      chart.update();
    }

  });
</script>

</body>
</html>
